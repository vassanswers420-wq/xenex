<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tixterminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body {
    background: radial-gradient(circle at top, #0a0f1c, #02050a);
    color: #e6edf3;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
}
header {
    padding: 10px 16px;
    background: rgba(20, 25, 40, 0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);

    display: flex;
    align-items: center;
    justify-content: space-between;
}
select{
  background:#1b1b1b;
  color:#ffffff;
}

select option{
  background:#1b1b1b;
  color:#ffffff;
}
select {
    background: rgba(255,255,255,0.05);
    color: #e6edf3;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;

    transition: all 0.2s ease;
}

select:hover {
    border-color: #00c8ff;
    background: rgba(255,255,255,0.08);
}
canvas { display: block; margin: 0;     background: radial-gradient(circle at center, #0a0f1c, #02050a);
 cursor: grab; }
canvas.hovered { cursor: crosshair; }

/* Settings gear */
#settingsWrapper  {
    position: absolute;
    top: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
}
#settingsWrapper { right: 10px; }


#gear {
    font-size: 16px;
    width: 34px;
    height: 34px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius: 50%;

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);

    color: #00c8ff;

    cursor:pointer;

    transition: all 0.25s ease;
}

#gear:hover {
    transform: rotate(90deg) scale(1.1);
    background: rgba(0,200,255,0.15);
    box-shadow: 0 0 12px rgba(0,200,255,0.4);
}

#settingsMenu {
    display: none;
    position: absolute;
    top: 35px;
    right: 0;

    width: 280px;
    max-height: 70vh;   /* dynamic height */
    overflow-y: auto;   /* allow scrolling */

    background: #111;
    border: 1px solid #444;
    border-radius: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);

    padding: 16px;
    padding-bottom: 6px;

    flex-direction: column;
    gap: 14px;

    font-size: 11px;
 color: #00c8ff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    letter-spacing: 1px;
    text-transform: uppercase;

    z-index: 100;
}

#settingsMenu.show{
    display:flex;
}
#settingsMenu label{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

#settingsMenu select,
#settingsMenu input{
    background:#222;
    border:1px solid #555;
    color:#fff;
    border-radius:4px;
    padding:4px 6px;
}
.settingsSection{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.settingsTitle{
    font-size:12px;
    color:#aaa;
    text-transform:uppercase;
    border-bottom:1px solid #333;
    padding-bottom:4px;
}



@media (max-width:768px){

header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:8px 14px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}
.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}
#settingsWrapper{
    position: relative;
    display: flex;
    align-items: center;
}

select{
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--border);

  padding:4px 8px;
  font-size:13px;
}
#headerIcons{
  display:flex;
  align-items:center;
}

#gear{
  width:30px;
  height:30px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
}
canvas{
    touch-action:none;
}
button{
padding:10px 14px;
font-size:16px;
border-radius:6px;
border:1px solid #666;
background:#222;
color:#fff;
}



canvas{
    touch-action: none;
}






/* S/R wrapper */

#srWrapper{
position:relative;
}

/* toggle button */

#srButton{
cursor:pointer;
padding:6px 10px;
background:#222;
border:1px solid #444;
border-radius:4px;
font-size:12px;
}

#srButton:hover{
background:#333;
}

/* settings panel */

#srWidget{

position:absolute;
top:35px;
right:0;

background:#111;
border:1px solid #444;
border-radius:6px;

padding:10px;
width:160px;

display:none;

flex-direction:column;
gap:8px;

font-size:12px;

z-index:1000;
}

#srWidget label{

display:flex;
justify-content:space-between;
align-items:center;

gap:8px;
}

#srWidget input{

width:60px;

background:#222;
color:#fff;

border:1px solid #444;
border-radius:3px;

padding:2px 4px;
}
/* Tutorial Overlay - unified for PC & Mobile */
#tutorialOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
}

#tutorialContent {
     background: linear-gradient(145deg, #0f172a, #020617);
    border: 1px solid rgba(255,255,255,0.08);

    color: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;       /* desktop won't be too wide */
    min-width: 300px;       /* ensures readability on small screens */
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    font-size: 16px;
}

#tutorialContent h2 {
    margin-bottom: 15px;
    color: #00c8ff;
    font-size: 24px;
}

#tutorialContent p {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}

#tutorialContent button {
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    background: #00ff66;
    color: #111;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

#tutorialContent button:hover {
    background: #00cc44;
}


#timeframeSelector {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-family: Arial, sans-serif;
    color: #fff;
}

#timeframeSelector select {
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    background: #111;
    color: #00ffcc;
    cursor: pointer;
    font-weight: bold;
}

#timeframeSelector select:hover {
    background: #222;
}
/* =========================
   MOBILE OPTIMIZATION
========================= */

@media (max-width:768px){

header{
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    padding:6px 8px;
}

/* selectors container */
#timeframeSelector,
header > div:first-child{
    display:flex;
    align-items:center;
    gap:6px;
}

/* shrink dropdowns */
select{
    font-size:13px;
    padding:4px 6px;
}

/* keep icons small */
#headerIcons{
    gap:6px;
}

#gear{
    width:32px;
    height:32px;
    font-size:16px;
}
}

header > div{
    width:100%;
}

select,button{
    width:100%;
    font-size:16px;
    padding:10px;
}

#settingsWrapper{
    position:static;
    justify-content:flex-end;
}

#settingsMenu{
    right:10px;
    left:auto;

    width:90vw;
    max-width:320px;

    top:45px;
}

#indicatorsWidget{
    width:90%;
    right:5%;
    top:80px;
}

#indicatorsBody{
    font-size:16px;
}

canvas{
    touch-action:none;
}

}
/* keep ticker + timeframe in one row */
.header-left{
    display:flex;
    align-items:center;
    gap:8px;
}

/* stop them from becoming full width */
.header-left > div{
    width:auto;
}

/* dropdowns stay compact */
.header-left select{
    width:auto;
    padding:4px 6px;
    font-size:13px;
}

/* labels smaller */
.header-left label{
    font-size:12px;
}

}
@media (max-width:768px){
header{
position:sticky;
top:0;
z-index:50;
}
}
}
</style>

</head>
<body>

<!-- Tutorial Overlay -->
<div id="tutorialOverlay">
    <div id="tutorialContent">
        <h2>Welcome to Avalanche</h2>
        <p>Use pinch or scroll to zoom the chart horizontally.<br>
        Drag to scroll through time to extend vertical range.<br>
        Try out our custom indicators!! from settings</p>
        <button id="tutorialClose">Got it!</button>
    </div>
</div>

<header>
  <div class="header-left">

    <div style="display:flex; align-items:center; gap:10px;">
        <label for="symbolSelect">Tick:</label>
        <select id="symbolSelect"><option>Loading...</option></select>
    </div>

    <div id="timeframeSelector">
        <label for="tfSelect">TF:</label>
        <select id="tfSelect">
            <option value="1">1 Min</option>
            <option value="5">5 Min</option>
            <option value="15">15 Min</option>
            <option value="30">30 Min</option>
            <option value="60">1 Hour</option>
        </select>
    </div>
  </div>

  <div id="headerIcons" style="display:flex; align-items:center; gap:12px;">
    <div id="settingsWrapper">
        <div id="gear">&#9881;</div>
			<div id="settingsMenu">

					<div class="settingsSection">
						<div class="settingsTitle">Chart</div>

						<label>
							Auto Scroll
							<input type="checkbox" id="autoScrollToggle">
						</label>

						<label>
							Theme
							<select id="themeSelect">
								<option value="dark">Dark Terminal</option>
								<option value="midnight">Day Dreamer</option>
								<option value="graphite">Graphite</option>
								<option value="dusk">Dusk</option>
							</select>
						</label>
					</div>

					<div class="settingsSection">
						<div class="settingsTitle">Support / Resistance</div>

						<div id="srWrapper">

							<label>
								Enable
								<input type="checkbox" id="srToggle">
							</label>

							<label>
								Max Levels
								<input type="number" id="srLevels" min="1" max="10" value="3">
							</label>

							<label>
								Min Touches
								<input type="number" id="srTouches" min="1" max="10" value="2">
							</label>

							<label>
								Tolerance %
								<input type="number" id="srTolerance" step="0.001" value="0.002">
							</label>

						</div>
					</div>
					<div class="settingsSection" id="smtSettings">

						<div class="settingsTitle">Avalanche Micro Target(custom)</div>

						<label class="settingItem">
						<input type="checkbox" id="smtToggle" checked>
						Enable AMT Indicator
						</label>

						<label class="settingItem">
						Lookback Candles
						<input type="number" id="smtLookback" value="20" min="5" max="50">
						</label>

				    </div>
					<div class="settingsSection" id="alpSettings">

						<div class="settingsTitle">Avalanche Liquidity Pulse (custom High TF)</div>

							<label class="settingItem">
							<input type="checkbox" id="alpToggle">
							Enable ALP Indicator
							</label>

							<label class="settingItem">
							Lookback Candles
							<input type="number" id="alpLookback" value="30" min="10" max="100">
							</label>

					</div>
					<div class="settingsSection">

						<div class="settingsTitle">Indicators</div>

						<label>
							SMA
							<input type="checkbox" id="smaToggle">
						</label>

						<label>
							SMA Period
							<input type="number" id="smaPeriod" value="20" min="1">
						</label>

						<label>
							EMA
							<input type="checkbox" id="emaToggle">
						</label>

						<label>
							EMA Period
							<input type="number" id="emaPeriod" value="9" min="1">
						</label>

						<label>
							VWAP
							<input type="checkbox" id="vwapToggle">
						</label>

					</div>

				</div>
    </div>
  </div>
</header>

<canvas id="chart"></canvas>

<div id="tooltip" style="
    position:absolute; background:rgba(0,0,0,0.8); color:#fff; padding:6px;
    font-size:12px; border-radius:4px; pointer-events:none; display:none;"></div>


<script src="sockets/script.js" defer></script>

</body>
</html>
