<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TixWatcher — NSE Market Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0a0a0a;--bg1:#0f0f0f;--bg2:#141414;--bg3:#1b1b1b;--bg4:#222;
  --border:#2a2a2a;--border2:#3a3a3a;
  --text1:#e6e6e6;--text2:#a0a0a0;--text3:#5c5c5c;
  --up:#00c853;--upd:rgba(0,200,83,0.12);
  --down:#ff3d00;--downd:rgba(255,61,0,0.12);
  --accent:#ffb300;--accentd:rgba(255,179,0,0.15);
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;width:100%;background:var(--bg0);color:var(--text1);font-family:var(--mono);font-size:13px;overflow:hidden}
#menubar{height:32px;background:#1a1d23;border-bottom:1px solid #2e3340;display:flex;align-items:center;padding:0 8px;gap:2px;flex-shrink:0;z-index:1000}
.menu-item{position:relative;padding:6px 14px;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:4px;transition:background .1s,color .1s;user-select:none}
.menu-item:hover{background:var(--bg3);color:var(--text1)}
.menu-item.active{background:var(--accentd);color:var(--accent)}
.menu-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:#1a1d23;border:1px solid #2e3340;border-radius:6px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:2000;overflow:hidden}
.menu-item.active .menu-dropdown{display:block}
.menu-opt{padding:8px 14px;font-size:11px;color:var(--text2);cursor:pointer;transition:background .1s,color .1s;display:flex;align-items:center;gap:10px;border-left:2px solid transparent}
.menu-opt:hover{background:var(--bg3);color:var(--text1);border-left-color:var(--accent)}
.menu-opt-icon{width:14px;text-align:center;color:var(--accent)}
.menu-sep{height:1px;background:var(--border);margin:4px 8px}
.spacer{flex:1}
.terminal-badge{font-size:10px;color:var(--accent);background:var(--accentd);padding:4px 10px;border-radius:12px;letter-spacing:.5px;font-weight:600}
#topbar{height:44px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:14px;flex-shrink:0}
.logo{font-family:var(--mono);font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--up);background:var(--upd);border:1px solid rgba(38,166,154,.3);padding:3px 9px;border-radius:20px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--up);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:0;background:var(--border);height:calc(100vh - 98px);overflow:hidden}
.chart-panel{background:var(--bg1);position:relative;display:flex;flex-direction:column;border:2px solid #333;overflow:hidden}
.panel-header{height:28px;background:#1a1d23;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
.panel-sym{font-size:11px;font-weight:600;color:var(--text1);min-width:60px}
.panel-symbol{background:var(--bg2);border:1px solid var(--border);color:var(--text1);font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;cursor:pointer;min-width:100px}
.panel-price{font-size:10px;color:var(--text2)}
.panel-tools{display:flex;gap:2px;margin-left:auto}
.ptool{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;font-size:10px;color:var(--text3);transition:background .1s,color .1s}
.ptool:hover{background:var(--bg3);color:var(--text1)}
.ptool.active{background:var(--accentd);color:var(--accent)}
.toolbox{display:flex;gap:4px;margin-left:8px;padding-left:8px;border-left:1px solid var(--border)}
.toolbox button{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer;transition:all .15s}
.toolbox button:hover{background:var(--bg3);color:var(--text1);border-color:var(--accent)}
.toolbox button.active{background:var(--accentd);color:var(--accent);border-color:var(--accent)}
.chart-body{flex:1;position:relative;min-height:0}
.chart-canvas{position:absolute;inset:0}
#statusbar{height:22px;background:var(--bg1);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:18px;font-size:10px;color:var(--text3);flex-shrink:0}
.tip{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;pointer-events:none;display:none;z-index:100;font-size:10px;min-width:140px;box-shadow:0 6px 24px rgba(0,0,0,.55)}
.tr{display:flex;justify-content:space-between;gap:12px;margin:2px 0}
.tl{color:var(--text3)}.tv{color:var(--text1);font-weight:500}
.tv.up{color:var(--up)}.tv.dn{color:var(--down)}
.loading{position:absolute;inset:0;background:rgba(10,10,10,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;transition:opacity .3s}
.loading.gone{opacity:0;pointer-events:none}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:10px;color:var(--text3)}
#inspector{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;align-items:center;justify-content:center}
#inspector.active{display:flex}
.inspector-panel{background:#1a1d23;border:1px solid #2e3340;border-radius:8px;width:90%;max-width:800px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.inspector-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.inspector-title{font-size:13px;font-weight:600;color:var(--text1)}
.inspector-close{margin-left:auto;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:var(--text3);transition:background .1s,color .1s}
.inspector-close:hover{background:var(--bg3);color:var(--text1)}
.inspector-body{flex:1;overflow-y:auto;padding:18px}
.inspector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s,background .15s}
.chart-card:hover{border-color:var(--accent);background:var(--bg3)}
.card-sym{font-size:12px;font-weight:600;color:var(--text1);margin-bottom:6px}
.card-info{font-size:9px;color:var(--text3);margin-bottom:4px}
.card-preview{width:100%;height:60px;background:var(--bg1);border-radius:4px;margin-top:8px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:9px}
.card-actions{display:flex;gap:6px;margin-top:8px}
.card-btn{flex:1;padding:4px 8px;font-size:9px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:3px;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.card-btn:hover{background:var(--bg4);color:var(--text1);border-color:var(--accent)}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><span class="logo-dot"></span>TixWatcher</div>
  <div style="width:1px;height:20px;background:var(--border)"></div>
  <div class="spacer"></div>
  <div class="live-badge"><span class="live-dot"></span>NSE LIVE</div>
</div>

<div id="menubar">
  <div class="menu-item" id="menu-file">File
    <div class="menu-dropdown">
      <div class="menu-opt" data-action="inspect"><span class="menu-opt-icon">🗂</span>Chart Inspector</div>
      <div class="menu-sep"></div>
      <div class="menu-opt" data-action="export"><span class="menu-opt-icon">↓</span>Export Layout</div>
      <div class="menu-opt" data-action="import"><span class="menu-opt-icon">↑</span>Import Layout</div>
    </div>
  </div>
  <div class="menu-item" id="menu-view">View
    <div class="menu-dropdown">
      <div class="menu-opt" data-action="layout-1x1"><span class="menu-opt-icon">▢</span>Single Chart</div>
      <div class="menu-opt" data-action="layout-1x2"><span class="menu-opt-icon">▦</span>Split View 2</div>
      <div class="menu-opt" data-action="layout-2x2"><span class="menu-opt-icon">▦</span>Quad View (2×2)</div>
    </div>
  </div>
  <div class="menu-item" id="menu-tools">Tools
    <div class="menu-dropdown">
      <div class="menu-opt" data-action="sync-charts"><span class="menu-opt-icon">⇄</span>Sync All Charts</div>
      <div class="menu-opt" data-action="reset-zoom"><span class="menu-opt-icon">⟲</span>Reset All Zoom</div>
      <div class="menu-sep"></div>
      <div class="menu-opt" data-action="screenshot"><span class="menu-opt-icon">📷</span>Screenshot</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="terminal-badge">TERMINAL v0.5 (Beta)</div>
</div>

<div id="main">
  <div class="chart-panel" data-panel="0">
    <div class="panel-header">
      <span class="panel-sym" data-sym>—</span>
      <select class="panel-symbol" data-symbol-select></select>
      <span class="panel-price" data-price>—</span>
      <div class="panel-tools">
        <div class="ptool" data-chart-type="candle" title="Candlestick"><svg viewBox="0 0 24 24" width="14" height="14"><line x1="6" y1="3" x2="6" y2="21" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="8" width="4" height="6" fill="currentColor"/><line x1="16" y1="3" x2="16" y2="21" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="5" width="4" height="10" fill="currentColor"/></svg></div>
        <div class="ptool" data-chart-type="heat" title="Heatmap"><svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="7" height="7" fill="currentColor"/><rect x="14" y="3" width="7" height="7" fill="currentColor"/><rect x="3" y="14" width="7" height="7" fill="currentColor"/><rect x="14" y="14" width="7" height="7" fill="currentColor"/></svg></div>
        <div class="ptool" data-chart-type="line" title="Line Chart"><svg viewBox="0 0 24 24" width="14" height="14" fill="none"><polyline points="3,16 9,10 13,14 21,6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="toolbox">
        <button data-draw-tool="trendline">Trendline</button>
        <button data-draw-tool="hline">H-Line</button>
        <button data-draw-tool="clear">Clear</button>
      </div>
    </div>
    <div class="chart-body"><canvas class="chart-canvas" data-canvas></canvas><div class="tip" data-tip></div><div class="loading"><div class="spin"></div><span class="ltxt">Loading…</span></div></div>
  </div>
  <div class="chart-panel" data-panel="1">
    <div class="panel-header">
      <span class="panel-sym" data-sym>—</span>
      <select class="panel-symbol" data-symbol-select></select>
      <span class="panel-price" data-price>—</span>
      <div class="panel-tools">

        <div class="ptool" data-chart-type="line" title="Line Chart"><svg viewBox="0 0 24 24" width="14" height="14" fill="none"><polyline points="3,16 9,10 13,14 21,6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="toolbox">
        <button data-draw-tool="trendline">Trendline</button>
        <button data-draw-tool="hline">H-Line</button>
        <button data-draw-tool="clear">Clear</button>
      </div>
    </div>
    <div class="chart-body"><canvas class="chart-canvas" data-canvas></canvas><div class="tip" data-tip></div><div class="loading"><div class="spin"></div><span class="ltxt">Loading…</span></div></div>
  </div>
  <div class="chart-panel" data-panel="2">
    <div class="panel-header">
      <span class="panel-sym" data-sym>—</span>
      <select class="panel-symbol" data-symbol-select></select>
      <span class="panel-price" data-price>—</span>
      <div class="panel-tools">
        <div class="ptool" data-chart-type="candle" title="Candlestick"><svg viewBox="0 0 24 24" width="14" height="14"><line x1="6" y1="3" x2="6" y2="21" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="8" width="4" height="6" fill="currentColor"/><line x1="16" y1="3" x2="16" y2="21" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="5" width="4" height="10" fill="currentColor"/></svg></div>
        <div class="ptool" data-chart-type="heat" title="Heatmap"><svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="7" height="7" fill="currentColor"/><rect x="14" y="3" width="7" height="7" fill="currentColor"/><rect x="3" y="14" width="7" height="7" fill="currentColor"/><rect x="14" y="14" width="7" height="7" fill="currentColor"/></svg></div>
        <div class="ptool" data-chart-type="line" title="Line Chart"><svg viewBox="0 0 24 24" width="14" height="14" fill="none"><polyline points="3,16 9,10 13,14 21,6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>

  </div>
  <div class="chart-panel" data-panel="3">
    <div class="panel-header">
      <span class="panel-sym" data-sym>—</span>
      <select class="panel-symbol" data-symbol-select></select>
      <span class="panel-price" data-price>—</span>

        <div class="ptool" data-chart-type="heat" title="Heatmap"><svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="7" height="7" fill="currentColor"/><rect x="14" y="3" width="7" height="7" fill="currentColor"/><rect x="3" y="14" width="7" height="7" fill="currentColor"/><rect x="14" y="14" width="7" height="7" fill="currentColor"/></svg></div>

    <div class="chart-body"><canvas class="chart-canvas" data-canvas></canvas><div class="tip" data-tip></div><div class="loading"><div class="spin"></div><span class="ltxt">Loading…</span></div></div>
  </div>
</div>

<div id="statusbar">
  <span id="sb-time">—</span>
  <span>NSE</span>
  <span id="sb-count">4 charts active</span>
  <div class="spacer"></div>
  <span id="sb-status">Ready</span>
</div>

<div id="inspector">
  <div class="inspector-panel">
    <div class="inspector-header">
      <span class="inspector-title">📊 Chart Inspector</span>
      <div class="inspector-close" onclick="closeInspector()">✕</div>
    </div>
    <div class="inspector-body">
      <div class="inspector-grid" id="inspector-grid"></div>
    </div>
  </div>
</div>

<script src="data-provider.js" defer></script>
<script src="chart-engine.js" defer></script>
</body>
</html>
